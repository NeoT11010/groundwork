// ═══════════════════════════════════════════════════════
// SCORING ENGINE
// ═══════════════════════════════════════════════════════
function calcScore(t1, t2, t3, completeness) {
  const t1Avg = t1.reduce((s,m) => s + m.value, 0) / t1.length;
  const t2Avg = t2.reduce((s,m) => s + m.value, 0) / t2.length;
  const t3Bonus = t3.filter(m => m.claimed).reduce((s,m) => s + m.points, 0);
  return Math.min(100, Math.round((t1Avg * 0.40 + t2Avg * 0.50) * completeness + t3Bonus));
}

const ScoreRing = ({ score, prev, size=120 }) => {
  const r = size/2 - 10; const circ = 2*Math.PI*r;
  const dash = (score/100)*circ;
  const color = score>=80?'#147a4e':score>=65?'#f59e0b':'#ef4444';
  const delta = prev !== undefined ? score - prev : null;
  return (
    <div className="flex flex-col items-center gap-1">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="score-glow">
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e2e8f0" strokeWidth="8"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${size/2} ${size/2})`}/>
        <text x={size/2} y={size/2-4} textAnchor="middle" dominantBaseline="middle" fontSize={size>100?'24':'16'} fontWeight="700" fill={color}>{score}</text>
        <text x={size/2} y={size/2+13} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="#94a3b8">/100</text>
      </svg>
      {delta!==null && <span className={`text-xs font-semibold ${delta>0?'text-brand-600':'text-red-500'}`}>{delta>0?'↑':'↓'}{Math.abs(delta)} this month</span>}
    </div>
  );
};

  const { company, score: ctxScore = 52, plantFleet = [], vehicleFleet = [], scoreHistory = [] } = useApp() || {};

  // Compute CO2 from live fleet data
  const totalPlantCO2 = plantFleet.reduce((s,p) => {
    const f = p.ef || DEFRA.plant[p.type]?.factor || 0;
    return s + (p.hvo ? p.hours*f*DEFRA.HVO_MULTIPLIER : p.hours*f)/1000;
  }, 0);
  const totalVehicleCO2 = vehicleFleet.reduce((s,v) => {
    const f = v.ef || DEFRA.vehicles[v.type]?.factor || 0;
    return s + v.miles*f/1000;
  }, 0);
  const totalCO2 = Math.round((totalPlantCO2+totalVehicleCO2)*100)/100;

  const displayHistory = scoreHistory.length > 0 ? scoreHistory : SCORE_HISTORY;

  return (
    <div className="flex-1 overflow-auto">
      <Header title="Dashboard" subtitle={company?.trade || 'Construction & Civil Engineering'}>
        <button onClick={() => onNavigate('update')} className="flex items-center gap-2 px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-all">
          ✏️ Update This Month
        </button>
      </Header>
      <div className="p-8">

        {/* Hero row */}
        <div className="grid grid-cols-4 gap-5 mb-8">
          <Card className="p-6 col-span-1 flex flex-col items-center justify-center">
            <p className="text-slate-400 text-xs font-medium uppercase tracking-wide mb-3">Groundwork Score</p>
            <ScoreRing score={ctxScore} prev={displayHistory.length > 1 ? displayHistory[displayHistory.length-2]?.score : undefined} size={120}/>
            <p className="text-slate-400 text-xs mt-3 text-center">{company?.name || 'Your Company'}</p>
          </Card>

          <div className="col-span-3 grid grid-cols-3 gap-5">
            {[
              { label:'CO₂e This Month',     value:`${totalCO2}t`,  sub:'Scope 1 — plant & fleet',    color:'text-slate-700',  icon:'🌍' },
              { label:'Plant Items',          value:`${plantFleet.length}`, sub:'registered in fleet',  color:'text-brand-600',  icon:'🏗️' },
              { label:'Vehicles',             value:`${vehicleFleet.length}`, sub:'registered in fleet',color:'text-slate-700',  icon:'🚐' },
              { label:'Company',              value: company?.name ? company.name.split(' ').slice(-1)[0] : '—', sub: company?.name || 'Complete setup wizard', color:'text-slate-700', icon:'🏢' },
              { label:'Plan',                 value: company?.plan ? (company.plan.charAt(0).toUpperCase()+company.plan.slice(1)) : 'Essentials', sub:'current subscription tier', color:'text-brand-600', icon:'📦' },
              { label:'HVO Saving (YTD)',     value:'0t',            sub:'Enable HVO to start saving',  color:'text-slate-400',  icon:'⚡' },
            ].map((k,i) => (
              <Card key={i} className="p-4">
                <div className="flex items-start justify-between">
                  <p className="text-slate-400 text-xs font-medium uppercase tracking-wide">{k.label}</p>
                  <span className="text-lg">{k.icon}</span>
                </div>
                <p className={`text-2xl font-bold mt-2 ${k.color}`}>{k.value}</p>
                <p className="text-slate-400 text-xs mt-0.5">{k.sub}</p>
              </Card>
            ))}
          </div>
        </div>

        {/* Score trend + Actions */}
        <div className="grid grid-cols-3 gap-5 mb-5">
          <Card className="col-span-2 p-6">
            <SectionHeader title="Score Trend" subtitle={`Past ${displayHistory.length} months`}/>
            <div className="flex items-end gap-2 h-32">
              {displayHistory.map((d,i) => {
                const h = (d.score/100)*100;
                const isLast = i===displayHistory.length-1;
                return (
                  <div key={d.month} className="flex-1 flex flex-col items-center gap-1">
                    <span className="text-xs font-semibold text-slate-600">{d.score}</span>
                    <div className={`w-full rounded-t-md transition-all ${isLast?'bg-brand-600':'bg-brand-200'}`} style={{height:`${h}%`}}/>
                    <span className="text-xs text-slate-400">{d.month}</span>
                  </div>
                );
              })}
              {displayHistory.length === 0 && (
                <div className="flex-1 flex items-center justify-center text-slate-400 text-sm">
                  No history yet — update your first month to start tracking.
                </div>
              )}
            </div>
          </Card>

          <Card className="p-6">
            <SectionHeader title="Quick Actions"/>
            <div className="space-y-2">
              {[
                { label:'Update this month\'s data', icon:'✏️', page:'update', primary:true  },
                { label:'Generate tender pack',       icon:'📄', page:'reports',primary:false },
                { label:'View improvement roadmap',   icon:'🗺️', page:'strategy',primary:false},
                { label:'Explore GHG breakdown',      icon:'🌍', page:'ghg',    primary:false },
              ].map(a => (
                <button key={a.label} onClick={() => onNavigate(a.page)}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-left transition-all
                    ${a.primary?'bg-brand-600 text-white hover:bg-brand-700':'bg-slate-50 text-slate-700 hover:bg-slate-100 border border-slate-100'}`}>
                  <span>{a.icon}</span>{a.label}
                </button>
              ))}
            </div>
          </Card>
        </div>

        {/* T1 snapshot */}
        <Card className="p-6">
          <SectionHeader title="Tier 1 — Universal Metrics" subtitle="6 core metrics · 40% of total score"
            action={<button onClick={() => onNavigate('insights')} className="text-sm text-brand-600 font-medium hover:underline">Full breakdown →</button>}/>
          <div className="grid grid-cols-3 gap-4">
            {TIER1.map(m => (
              <div key={m.id} className="p-3 bg-slate-50 rounded-xl border border-slate-100">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-xs font-medium text-slate-700">{m.label}</span>
                  <span className={`text-sm font-bold ${m.value>=m.target?'text-brand-600':m.value>=m.target*0.8?'text-amber-500':'text-red-500'}`}>{m.value}{m.unit==='%'?'%':''}</span>
                </div>
                <ProgressBar value={(m.value/m.target)*100} color={m.value>=m.target?'bg-brand-500':m.value>=m.target*0.8?'bg-amber-400':'bg-red-400'}/>
                <p className="text-slate-400 text-xs mt-1 leading-tight">{m.note}</p>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
};

// UPDATE DATA

// Last month's pre-fill values (what gets shown as "same as last month?")
const LAST_MONTH_PLANT = { 1:142, 2:98, 3:210, 4:76 };
const LAST_MONTH_VEH   = { 1:1840, 2:2210, 3:980 };

const UpdatePage = ({ onNavigate }) => {
  const { plantFleet = [], vehicleFleet = [], score: ctxScore = 52, refreshData } = useApp() || {};
  const [plant, setPlant]       = useState(() => plantFleet.map(p => ({...p, lastHours: p.hours, confirmed:false})));
  const [vehicles, setVehicles] = useState(() => vehicleFleet.map(v => ({...v, lastMiles: v.miles, confirmed:false})));
  const [skips, setSkips]       = useState(SKIP_LOG.map(s => ({...s})));
  const [t1, setT1]             = useState(TIER1.map(m => ({...m})));
  const [openSection, setOpenSection] = useState('plant');
  const [saved, setSaved]       = useState(false);
  const [saving, setSaving]     = useState(false);
  const [done, setDone]         = useState(false);

  const liveScore = calcScore(t1, TIER2, TIER3, 0.95);
  const scoreDelta = liveScore - ctxScore;

  const plantCO2 = plant.reduce((s,p) => {
    const f = p.ef || DEFRA.plant[p.type]?.factor || 0;
    return s + (p.hvo ? p.hours*f*DEFRA.HVO_MULTIPLIER : p.hours*f)/1000;
  }, 0);

  const totalSkips = skips.reduce((s,k) => s+k.qty, 0);
  const recycledSkips = skips.filter(k=>k.diversion).reduce((s,k) => s+k.qty, 0);
  const diversionRate = totalSkips>0 ? Math.round((recycledSkips/totalSkips)*100) : 0;

  const sections = [
    { id:'plant',    label:'Plant & Equipment', icon:'🏗️', status: plant.every(p=>p.hours>0)?'done':'pending' },
    { id:'vehicles', label:'Fleet & Transport',  icon:'🚐', status: vehicles.every(v=>v.miles>0)?'done':'pending' },
    { id:'skips',    label:'Waste & Skips',      icon:'♻️', status: skips.length>0?'done':'pending' },
    { id:'t1checks', label:'Compliance Checks',  icon:'✅', status: 'done' },
  ];
  const doneCount = sections.filter(s=>s.status==='done').length;

  // ── DONE SCREEN ──
  if (done) return (
    <div className="flex-1 overflow-auto">
      <Header title="Update Data" subtitle="Monthly data entry — approx. 5–8 minutes"/>
      <div className="flex items-center justify-center min-h-[calc(100vh-4rem)] p-8">
        <div className="text-center max-w-lg">
          <div className="w-20 h-20 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <span className="text-4xl">✅</span>
          </div>
          <h2 className="text-3xl font-bold text-slate-900 mb-2">Score updated</h2>
          <div className="flex items-center justify-center gap-6 my-6">
            <div className="text-center">
              <p className="text-4xl font-bold text-slate-400">{ctxScore}</p>
              <p className="text-xs text-slate-400 mt-1">Previous</p>
            </div>
            <span className="text-3xl text-slate-300">→</span>
            <div className="text-center">
              <p className="text-4xl font-bold text-brand-600">{liveScore}</p>
              <p className="text-xs text-slate-400 mt-1">Updated</p>
            </div>
            <div className="px-3 py-1.5 bg-brand-100 text-brand-700 rounded-full text-sm font-bold">
              {liveScore - ctxScore >= 0 ? '+' : ''}{liveScore - ctxScore} pts
            </div>
          </div>
          <p className="text-slate-500 text-sm mb-8">Your score has been updated with this month's data. Reports will reflect the new figures immediately.</p>
          <div className="flex flex-col gap-3">
            <button onClick={() => onNavigate && onNavigate('reports')}
              className="w-full py-3.5 bg-brand-600 text-white font-semibold rounded-xl hover:bg-brand-700 transition-all">
              Generate updated tender pack →
            </button>
            <button onClick={() => onNavigate && onNavigate('dashboard')}
              className="w-full py-3 bg-slate-100 text-slate-700 font-medium rounded-xl hover:bg-slate-200 transition-all">
              Back to dashboard
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="flex-1 overflow-auto">
      <Header title="Update Data" subtitle="Monthly data entry — approx. 5–8 minutes">
        <div className={`flex items-center gap-2 px-3 py-1.5 rounded-lg text-sm font-semibold ${scoreDelta>0?'bg-brand-100 text-brand-700':'bg-amber-100 text-amber-700'}`}>
          <span className="live-indicator w-2 h-2 rounded-full bg-current inline-block"/>
          Live: {liveScore} {scoreDelta>0?`(+${scoreDelta})`:`(${scoreDelta})`}
        </div>
      </Header>
      <div className="p-8">

        {/* Progress */}
        <div className="flex items-center gap-4 mb-6 p-4 bg-white rounded-2xl border border-slate-100 shadow-sm">
          <div className="flex-1">
            <div className="flex justify-between text-sm mb-1.5">
              <span className="font-medium text-slate-700">{doneCount} of {sections.length} sections complete</span>
              <span className="text-slate-400">{Math.round((doneCount/sections.length)*100)}%</span>
            </div>
            <ProgressBar value={(doneCount/sections.length)*100} color="bg-brand-600" height="h-2.5"/>
          </div>
          <button disabled={saving} onClick={async () => {
            setSaving(true);
            const user = supabaseClient ? (await supabaseClient.auth.getUser()).data?.user : null;
            if (user && !DEMO_MODE) {
              try {
                const plantData = plant.map(p => ({ plant_id: p.id, name: p.name, hours: p.hours }));
                const vehicleData = vehicles.map(v => ({ vehicle_id: v.id, name: v.name, miles: v.miles }));
                const co2e = plantCO2;
                await DB.saveMonthlyUpdate({ userId: user.id, plant: plantData, vehicles: vehicleData, score: liveScore, co2e });
                if (refreshData) refreshData();
              } catch(_) {}
            }
            setSaving(false); setSaved(true); setTimeout(()=>setDone(true), 400);
          }} className="px-5 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-xl hover:bg-brand-700 transition-all disabled:opacity-60 flex items-center gap-2">
            {saving ? <><span className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin inline-block"/>Saving…</> : saved ? '✓ Saved' : 'Save & Update Score'}
          </button>
        </div>

        {/* Sections */}
        <div className="space-y-3">
          {sections.map(sec => (
            <div key={sec.id} className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
              <button className="w-full flex items-center gap-4 px-6 py-4 text-left hover:bg-slate-50 transition-all"
                onClick={() => setOpenSection(openSection===sec.id?null:sec.id)}>
                <span className="text-xl">{sec.icon}</span>
                <span className="font-semibold text-slate-800 flex-1">{sec.label}</span>
                <Badge status={sec.status}/>
                <span className="text-slate-400 text-sm ml-2">{openSection===sec.id?'▲':'▼'}</span>
              </button>

              {openSection===sec.id && (
                <div className="px-6 pb-6 pt-2 border-t border-slate-50">

                  {/* PLANT */}
                  {sec.id==='plant' && (
                    <div>
                      <p className="text-xs text-slate-400 mb-4">Enter hours run this month. HVO toggle reduces CO₂e by 90%.</p>
                      {plant.length === 0 && (
                        <div className="text-center py-8 text-slate-400">
                          <p className="text-3xl mb-2">🏗️</p>
                          <p className="text-sm font-medium">No plant registered yet.</p>
                          <p className="text-xs mt-1">Run the setup wizard to add your plant fleet.</p>
                        </div>
                      )}
                      <div className="space-y-3">
                        {plant.map((p,i) => {
                          const f = p.ef || DEFRA.plant[p.type]?.factor || 0;
                          const co2 = p.hvo ? Math.round(p.hours*f*DEFRA.HVO_MULTIPLIER*10)/10 : Math.round(p.hours*f*10)/10;
                          const lastVal = p.lastHours || 0;
                          return (
                            <div key={p.id} className={`grid grid-cols-5 gap-3 items-center p-3 rounded-xl border transition-all ${p.confirmed?'bg-brand-50 border-brand-200':'bg-slate-50 border-slate-100'}`}>
                              <div className="col-span-2">
                                <p className="text-sm font-medium text-slate-800">{p.name}</p>
                                <p className="text-xs text-slate-400">{p.type}</p>
                                {lastVal > 0 && <p className="text-xs text-brand-500 mt-0.5">Last month: {lastVal} hrs</p>}
                              </div>
                              <div>
                                <label className="text-xs text-slate-500 block mb-1">Hours this month</label>
                                <div className="flex gap-1.5">
                                  <input type="number" value={p.hours} min="0"
                                    onChange={e => setPlant(prev => prev.map((x,j) => j===i?{...x,hours:+e.target.value,confirmed:false}:x))}
                                    className={`w-full border rounded-lg px-3 py-1.5 text-sm focus:outline-none transition-all ${p.confirmed?'border-brand-300 bg-white':'border-slate-200 focus:border-brand-400'}`}/>
                                  {lastVal > 0 && !p.confirmed && (
                                    <button title="Same as last month"
                                      onClick={() => setPlant(prev => prev.map((x,j) => j===i?{...x,hours:lastVal,confirmed:true}:x))}
                                      className="px-2 py-1.5 bg-brand-100 text-brand-600 rounded-lg text-xs font-bold hover:bg-brand-200 whitespace-nowrap transition-all">
                                      ✓ Same
                                    </button>
                                  )}
                                  {p.confirmed && <span className="px-2 py-1.5 bg-brand-500 text-white rounded-lg text-xs font-bold">✓</span>}
                                </div>
                              </div>
                              <div className="text-center">
                                <p className="text-xs text-slate-500 mb-1">HVO fuel</p>
                                <button onClick={() => setPlant(prev => prev.map((x,j) => j===i?{...x,hvo:!x.hvo}:x))}
                                  className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${p.hvo?'bg-brand-600 text-white':'bg-slate-200 text-slate-500'}`}>
                                  {p.hvo?'HVO ✓':'OFF'}
                                </button>
                              </div>
                              <div className="text-right">
                                <p className="text-xs text-slate-400">CO₂e</p>
                                <p className={`text-sm font-bold ${p.hvo?'text-brand-600':'text-slate-700'}`}>{(co2/1000).toFixed(3)}t</p>
                                {p.hvo && <p className="text-xs text-brand-500">−90%</p>}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <div className="mt-4 p-3 bg-brand-50 rounded-xl border border-brand-100">
                        <p className="text-sm text-brand-700 font-medium">Total plant CO₂e this month: <strong>{plantCO2.toFixed(3)}t</strong></p>
                        <p className="text-xs text-brand-500 mt-0.5">DEFRA 2024 GHG Conversion Factors applied</p>
                      </div>
                    </div>
                  )}

                  {/* VEHICLES */}
                  {sec.id==='vehicles' && (
                    <div>
                      <p className="text-xs text-slate-400 mb-4">Enter miles driven per vehicle this month.</p>
                      {vehicles.length === 0 && (
                        <div className="text-center py-8 text-slate-400">
                          <p className="text-3xl mb-2">🚐</p>
                          <p className="text-sm font-medium">No vehicles registered yet.</p>
                          <p className="text-xs mt-1">Run the setup wizard to add your fleet.</p>
                        </div>
                      )}
                      <div className="space-y-3">
                        {vehicles.map((v,i) => {
                          const f = v.ef || DEFRA.vehicles[v.type]?.factor || 0;
                          const co2 = Math.round(v.miles*f*100)/100;
                          const isElec = v.type?.toLowerCase().includes('electric');
                          const lastVal = v.lastMiles || 0;
                          return (
                            <div key={v.id} className={`grid grid-cols-4 gap-3 items-center p-3 rounded-xl border transition-all ${v.confirmed?'bg-brand-50 border-brand-200':'bg-slate-50 border-slate-100'}`}>
                              <div className="col-span-2">
                                <p className="text-sm font-medium text-slate-800">{v.name}</p>
                                <p className={`text-xs ${isElec?'text-brand-500 font-semibold':'text-slate-400'}`}>{v.type}{isElec?' ⚡':''}</p>
                                {lastVal > 0 && <p className="text-xs text-brand-500 mt-0.5">Last month: {lastVal.toLocaleString()} mi</p>}
                              </div>
                              <div>
                                <label className="text-xs text-slate-500 block mb-1">Miles this month</label>
                                <div className="flex gap-1.5">
                                  <input type="number" value={v.miles} min="0"
                                    onChange={e => setVehicles(prev => prev.map((x,j) => j===i?{...x,miles:+e.target.value,confirmed:false}:x))}
                                    className={`w-full border rounded-lg px-3 py-1.5 text-sm focus:outline-none transition-all ${v.confirmed?'border-brand-300 bg-white':'border-slate-200 focus:border-brand-400'}`}/>
                                  {lastVal > 0 && !v.confirmed && (
                                    <button title="Same as last month"
                                      onClick={() => setVehicles(prev => prev.map((x,j) => j===i?{...x,miles:lastVal,confirmed:true}:x))}
                                      className="px-2 py-1.5 bg-brand-100 text-brand-600 rounded-lg text-xs font-bold hover:bg-brand-200 whitespace-nowrap transition-all">
                                      ✓ Same
                                    </button>
                                  )}
                                  {v.confirmed && <span className="px-2 py-1.5 bg-brand-500 text-white rounded-lg text-xs font-bold">✓</span>}
                                </div>
                              </div>
                              <div className="text-right">
                                <p className="text-xs text-slate-400">CO₂e</p>
                                <p className={`text-sm font-bold ${isElec?'text-brand-600':'text-slate-700'}`}>{(co2/1000).toFixed(3)}t</p>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* SKIPS */}
                  {sec.id==='skips' && (
                    <div>
                      <p className="text-xs text-slate-400 mb-4">Log all skips lifted this month. Diversion rate auto-calculates.</p>
                      <div className="space-y-2">
                        {skips.map((s,i) => (
                          <div key={s.id} className="grid grid-cols-5 gap-2 items-center p-3 bg-slate-50 rounded-xl">
                            <select value={s.size} onChange={e => setSkips(prev => prev.map((x,j) => j===i?{...x,size:e.target.value}:x))}
                              className="border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none">
                              {['2yd','4yd','6yd','8yd','10yd','12yd','16yd','RoRo'].map(z => <option key={z}>{z}</option>)}
                            </select>
                            <div className="flex items-center gap-2">
                              <button onClick={() => setSkips(prev => prev.map((x,j) => j===i&&x.qty>1?{...x,qty:x.qty-1}:x))} className="w-7 h-7 rounded-lg bg-slate-200 text-slate-600 text-sm font-bold">−</button>
                              <span className="text-sm font-semibold w-4 text-center">{s.qty}</span>
                              <button onClick={() => setSkips(prev => prev.map((x,j) => j===i?{...x,qty:x.qty+1}:x))} className="w-7 h-7 rounded-lg bg-brand-100 text-brand-700 text-sm font-bold">+</button>
                            </div>
                            <select value={s.dest} onChange={e => setSkips(prev => prev.map((x,j) => j===i?{...x,dest:e.target.value,diversion:e.target.value!=='General Landfill'}:x))}
                              className="col-span-2 border border-slate-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none">
                              {['Licensed Recycler','Inert Fill','Energy Recovery','General Landfill'].map(d => <option key={d}>{d}</option>)}
                            </select>
                            <div className="flex items-center justify-end gap-2">
                              <span className={`text-xs font-semibold ${s.diversion?'text-brand-600':'text-red-500'}`}>{s.diversion?'✓ Diverted':'✗ Landfill'}</span>
                              <button onClick={() => setSkips(prev => prev.filter((_,j) => j!==i))} className="text-red-400 hover:text-red-600 text-sm">✕</button>
                            </div>
                          </div>
                        ))}
                      </div>
                      <button onClick={() => setSkips(prev => [...prev,{id:Date.now(),size:'8yd',qty:1,dest:'Licensed Recycler',diversion:true}])}
                        className="mt-3 px-4 py-2 border border-dashed border-brand-300 text-brand-600 text-sm rounded-xl hover:bg-brand-50 w-full">
                        + Add skip
                      </button>
                      <div className="mt-4 p-3 bg-slate-50 rounded-xl flex items-center justify-between">
                        <span className="text-sm text-slate-600">Diversion rate this month</span>
                        <span className={`text-lg font-bold ${diversionRate>=80?'text-brand-600':diversionRate>=60?'text-amber-500':'text-red-500'}`}>{diversionRate}%</span>
                      </div>
                    </div>
                  )}

                  {/* T1 CHECKS */}
                  {sec.id==='t1checks' && (
                    <div>
                      <p className="text-xs text-slate-400 mb-4">Confirm or update your current Tier 1 performance metrics.</p>

const scoreRingSVG = (score, size=100) => {
  const r = size/2-8; const c = 2*Math.PI*r;
  const dash = (score/100)*c;
  const col = score>=80?'#147a4e':score>=65?'#f59e0b':'#ef4444';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e2e8f0" stroke-width="7"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="7"
      stroke-dasharray="${dash} ${c}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="${size/2}" y="${size/2-3}" text-anchor="middle" dominant-baseline="middle" font-size="${size>90?20:14}" font-weight="800" fill="${col}">${score}</text>
    <text x="${size/2}" y="${size/2+14}" text-anchor="middle" font-size="8" fill="#94a3b8">/100</text>
  </svg>`;
};

const TenderPage = () => {
  const { company, score: ctxScore = 52 } = useApp() || {};
  const [tab, setTab]             = useState('live');
  const [tenders, setTenders]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [search, setSearch]       = useState('');
  const [selected, setSelected]   = useState(null);
  const [analysis, setAnalysis]   = useState({});   // keyed by tender id
  const [analysing, setAnalysing] = useState(null);
  const [applications, setApplications] = useState([]);
  const [activeFilters, setActiveFilters] = useState([]);

  const NICHES = ['Net Zero','Retrofit','Education','Healthcare','Housing','Infrastructure','Community','BREEAM','Passivhaus','Modular'];

  const fetchTenders = async (q = '') => {
    try {
      const url = q ? `${EDGE_BASE}/tenders?q=${encodeURIComponent(q)}` : `${EDGE_BASE}/tenders`;
      const r = await fetch(url);
      const data = await r.json();
      setTenders(data.tenders ?? []);
    } catch(e) {
      console.error('Tender fetch error', e);
    }
  };

  React.useEffect(() => {
    fetchTenders().finally(() => setLoading(false));
  }, []);

  const handleRefresh = async () => {
    setRefreshing(true);
    await fetchTenders(search);
    setRefreshing(false);
  };

  const handleSearch = async (q) => {
    setSearch(q);
    if (q.length === 0 || q.length > 2) await fetchTenders(q);
  };

  const handleFilter = (niche) => {
    const next = activeFilters.includes(niche) ? activeFilters.filter(f=>f!==niche) : [...activeFilters, niche];
    setActiveFilters(next);
  };

  const handleAnalyse = async (tender) => {
    if (analysis[tender.id]) return;
    setAnalysing(tender.id);
    try {
      const r = await fetch(`${EDGE_BASE}/analyze-tender`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tender, company: { score: ctxScore, plan: company?.plan || 'growth', trade: company?.trade || '' } }),
      });
      const data = await r.json();
      setAnalysis(prev => ({ ...prev, [tender.id]: data }));
    } catch(e) {
      setAnalysis(prev => ({ ...prev, [tender.id]: { error: true } }));
    }
    setAnalysing(null);
  };

  const handleTrack = (tender) => {
    if (applications.some(a => a.id === tender.id)) return;
    setApplications(prev => [...prev, { ...tender, tracked_at: new Date().toISOString(), status: 'applied', notes: '' }]);
    setTab('applications');
  };

  const updateAppStatus = (id, status) => setApplications(prev => prev.map(a => a.id===id ? {...a, status} : a));
  const removeApp = (id) => setApplications(prev => prev.filter(a => a.id !== id));

  const filteredTenders = tenders.filter(t => {
    if (activeFilters.length === 0) return true;
    return activeFilters.some(f => t.tags?.some(tag => tag.toLowerCase() === f.toLowerCase()));
  });

  const eligibleCount = tenders.filter(t => t.eligibility_score >= 80).length;
  const partialCount  = tenders.filter(t => t.eligibility_score >= 60 && t.eligibility_score < 80).length;
  const pipelineVal   = tenders.reduce((sum, t) => sum + (t.value_max || 0), 0);

  const statusColor = (s) => s === 'applied' ? 'bg-blue-100 text-blue-700' : s === 'submitted' ? 'bg-amber-100 text-amber-700' : s === 'won' ? 'bg-brand-100 text-brand-700' : 'bg-red-100 text-red-700';
  const wonJobs = applications.filter(a => a.status === 'won');

  return (
    <div className="flex-1 overflow-auto">
      <Header title="Tender Tracker" subtitle="Live UK government construction tenders">
        <button onClick={handleRefresh} disabled={refreshing}
          className="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-600 text-sm font-medium rounded-lg hover:bg-slate-50 transition-all disabled:opacity-50">
          <svg className={`w-4 h-4 ${refreshing ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          {refreshing ? 'Refreshing…' : 'Refresh'}
        </button>
      </Header>
      <div className="p-8">
        {/* Stats row */}
        <div className="grid grid-cols-4 gap-4 mb-6">
          {[
            { label:'Eligible Now',   value: loading ? '—' : eligibleCount, sub:`of ${tenders.length} tenders`, color:'text-brand-600' },
            { label:'Partial Match',  value: loading ? '—' : partialCount,  sub:'1–2 items missing',            color:'text-amber-500' },
            { label:'Applications',   value: applications.length,            sub:`${wonJobs.length} won`,        color:'text-blue-600'  },
            { label:'Pipeline Value', value: loading ? '—' : `£${pipelineVal >= 1000000 ? (pipelineVal/1000000).toFixed(1)+'m' : (pipelineVal/1000).toFixed(0)+'k'}`, sub:'total tracked value', color:'text-slate-700' },
          ].map(k=>(
            <Card key={k.label} className="p-4">
              <p className="text-slate-400 text-xs uppercase tracking-wide font-medium">{k.label}</p>
              <p className={`text-2xl font-bold mt-1 ${k.color}`}>{k.value}</p>
              <p className="text-xs text-slate-400 mt-0.5">{k.sub}</p>
            </Card>
          ))}
        </div>

        <Tabs tabs={[{id:'live',label:'All Tenders'},{id:'applications',label:`My Applications (${applications.length})`},{id:'jobs',label:`Current Jobs (${wonJobs.length})`}]} active={tab} onChange={setTab}/>

        {/* Live tenders tab */}
        {tab==='live' && (
          <>
            {/* Search + filters */}
            <div className="flex gap-3 mb-4">
              <div className="relative flex-1">
                <svg className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e=>handleSearch(e.target.value)} placeholder="Search tenders (e.g. retrofit, net zero, school)…"
                  className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-400 bg-white"/>
              </div>
            </div>
            <div className="flex flex-wrap gap-2 mb-5">
              {NICHES.map(n => (
                <button key={n} onClick={() => handleFilter(n)}
                  className={`px-3 py-1.5 rounded-full text-xs font-semibold border transition-all ${activeFilters.includes(n) ? 'bg-brand-600 text-white border-brand-600' : 'bg-white text-slate-600 border-slate-200 hover:border-brand-300'}`}>
                  {n}
                </button>
              ))}
            </div>

            {loading ? (
              <div className="flex items-center justify-center py-20">
                <div className="flex flex-col items-center gap-3">
                  <div className="w-8 h-8 border-2 border-brand-600 border-t-transparent rounded-full animate-spin"/>
                  <p className="text-slate-400 text-sm">Fetching live UK government tenders…</p>
                </div>
              </div>
            ) : filteredTenders.length === 0 ? (
              <div className="text-center py-16">
                <p className="text-slate-400 text-sm">No tenders match your filters. <button onClick={() => { setActiveFilters([]); setSearch(''); fetchTenders(); }} className="text-brand-600 font-medium">Clear filters</button></p>
              </div>
            ) : (
              <div className="space-y-3">
                {filteredTenders.map(t => {
                  const score = t.eligibility_score ?? 70;
                  const missing = t.missing_requirements ?? [];
                  const elig = score >= 80 ? 'eligible' : score >= 60 ? 'partial' : 'not-eligible';
                  const ai = analysis[t.id];
                  const isAnalysing = analysing === t.id;
                  const isTracked = applications.some(a => a.id === t.id);

                  return (
                    <div key={t.id} className={`bg-white rounded-2xl border shadow-sm transition-all hover:shadow-md ${selected?.id===t.id ? 'border-brand-400 ring-1 ring-brand-200' : 'border-slate-100'}`}>
                      <div className="p-5 cursor-pointer" onClick={() => setSelected(selected?.id===t.id ? null : t)}>
                        <div className="flex items-start justify-between gap-4">
                          <div className="flex-1">
                            <div className="flex items-center gap-2 flex-wrap mb-1">
                              <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${elig==='eligible'?'bg-brand-100 text-brand-700':elig==='partial'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-600'}`}>
                                {elig==='eligible'?'✓ Eligible':elig==='partial'?'⚡ Partial':'✗ Not Eligible'}
                              </span>
                              {(t.tags??[]).slice(0,3).map(tag=><span key={tag} className="text-xs text-brand-600 bg-brand-50 border border-brand-100 px-2 py-0.5 rounded-full">{tag}</span>)}
                            </div>
                            <p className="font-semibold text-slate-800">{t.title}</p>
                            <p className="text-slate-400 text-sm mt-0.5">{t.authority}</p>
                          </div>
                          <div className="text-right flex-shrink-0">
                            <p className="font-semibold text-slate-800 text-sm">{t.value}</p>
                            <p className="text-slate-400 text-xs mt-0.5">{t.deadline ? `Closes ${new Date(t.deadline).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}` : 'See source'}</p>
                          </div>
                        </div>
                        <div className="mt-3">
                          <div className="flex justify-between text-xs mb-1">
                            <span className="text-slate-400">Eligibility match</span>
                            <span className="font-semibold">{score}%</span>
                          </div>
                          <ProgressBar value={score} color={score>=80?'bg-brand-500':score>=60?'bg-amber-400':'bg-red-400'}/>
                        </div>
                      </div>

                      {selected?.id===t.id && (
                        <div className="px-5 pb-5 border-t border-slate-100">
                          <p className="text-sm text-slate-500 mt-4 mb-4 leading-relaxed">{t.description}</p>
                          <div className="grid grid-cols-2 gap-4 mb-4">
                            <div>
                              <p className="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Requirements</p>
                              {missing.length === 0 ? (
                                <div className="p-3 bg-brand-50 border border-brand-100 rounded-xl">
                                  <p className="text-sm font-semibold text-brand-700">✓ Fully eligible</p>
                                  <p className="text-xs text-brand-500 mt-0.5">No missing requirements identified.</p>
                                </div>
                              ) : (
                                <div className="space-y-1.5">
                                  {missing.map(m=>(
                                    <div key={m} className="flex items-center gap-2 p-2 bg-amber-50 border border-amber-100 rounded-lg">
                                      <span className="text-amber-500 text-sm">⚠</span>
                                      <span className="text-sm text-amber-700">{m}</span>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                            <div>
                              {/* AI insights panel */}
                              {!ai && (
                                <button onClick={() => handleAnalyse(t)} disabled={isAnalysing}
                                  className="w-full py-2.5 px-4 bg-brand-50 border border-brand-200 text-brand-700 rounded-xl text-sm font-semibold hover:bg-brand-100 transition-all flex items-center justify-center gap-2 disabled:opacity-60">
                                  {isAnalysing ? <><span className="w-4 h-4 border-2 border-brand-600 border-t-transparent rounded-full animate-spin inline-block"/>Analysing…</> : '🤖 Get AI Insights'}
                                </button>
                              )}
                              {ai && !ai.error && (
                                <div className="bg-slate-50 rounded-xl p-3 border border-slate-100">
                                  <div className="flex items-center justify-between mb-2">
                                    <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">AI Analysis</span>
                                    {ai.ai_powered && <span className="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-semibold">GPT-4o</span>}
                                  </div>
                                  <div className="flex items-center gap-3 mb-2">
                                    <div className="text-2xl font-black text-brand-700">{ai.likelihood}%</div>
                                    <div>
                                      <p className="text-xs font-semibold text-slate-700">Success likelihood</p>
                                      <span className={`text-xs px-2 py-0.5 rounded-full font-semibold ${ai.confidence==='High'?'bg-brand-100 text-brand-700':ai.confidence==='Medium'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700'}`}>{ai.confidence} confidence</span>
                                    </div>
                                  </div>
                                  <p className="text-xs text-slate-600 italic mt-1">{ai.timeline}</p>
                                  {ai.recommendations?.[0] && (
                                    <div className="mt-2 p-2 bg-brand-50 rounded-lg">
                                      <p className="text-xs font-semibold text-brand-700">Top recommendation</p>
                                      <p className="text-xs text-brand-600 mt-0.5">{ai.recommendations[0]}</p>
                                    </div>
                                  )}
                                </div>
                              )}
                              {ai?.error && <p className="text-xs text-red-500">Analysis unavailable. Try again.</p>}
                            </div>
                          </div>
                          <div className="flex gap-3">
                            {t.source_url && (
                              <a href={t.source_url} target="_blank" rel="noopener noreferrer"
                                className="flex-1 py-2 text-center border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-all">
                                View on {t.source} ↗
                              </a>
                            )}
                            <button onClick={() => handleTrack(t)} disabled={isTracked}
                              className={`flex-1 py-2 rounded-lg text-sm font-medium transition-all ${isTracked ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-brand-600 text-white hover:bg-brand-700'}`}>
                              {isTracked ? '✓ Tracked' : 'Track Application →'}
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}

        {/* Applications tab */}
        {tab==='applications' && (
          <div>
            {applications.length === 0 ? (
              <div className="text-center py-16">
                <p className="text-3xl mb-3">📋</p>
                <p className="text-slate-700 font-semibold">No applications yet</p>
                <p className="text-slate-400 text-sm mt-1">Browse live tenders and click "Track Application" to add them here.</p>
                <button onClick={() => setTab('live')} className="mt-4 px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700">Browse Tenders →</button>
              </div>
            ) : (
              <div className="space-y-3">
                {applications.map(a => (
                  <Card key={a.id} className="p-5">
                    <div className="flex items-start justify-between gap-4">
                      <div className="flex-1">
                        <p className="font-semibold text-slate-800">{a.title}</p>
                        <p className="text-slate-400 text-sm mt-0.5">{a.authority} · {a.value}</p>
                        <p className="text-xs text-slate-400 mt-1">Applied {new Date(a.tracked_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</p>
                      </div>
                      <div className="flex items-center gap-3">
                        <select value={a.status} onChange={e=>updateAppStatus(a.id, e.target.value)}
                          className="text-sm border border-slate-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-brand-400">
                          {['applied','submitted','shortlisted','won','lost'].map(s=><option key={s} value={s}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}
                        </select>
                        <span className={`text-xs font-semibold px-2 py-1 rounded-full ${statusColor(a.status)}`}>{a.status}</span>
                        <button onClick={() => removeApp(a.id)} className="text-slate-300 hover:text-red-400 transition-colors text-lg">×</button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Won jobs tab */}
        {tab==='jobs' && (
          <div>
            {wonJobs.length === 0 ? (
              <div className="text-center py-16">
                <p className="text-3xl mb-3">🏆</p>
                <p className="text-slate-700 font-semibold">No won contracts yet</p>
                <p className="text-slate-400 text-sm mt-1">Mark applications as "Won" in the Applications tab to track them here.</p>
              </div>
            ) : (
              <div className="grid grid-cols-2 gap-4">
                {wonJobs.map(j => (
                  <Card key={j.id} className="p-5 border-l-4 border-l-brand-500">
                    <p className="font-semibold text-slate-800">{j.title}</p>
                    <p className="text-slate-400 text-sm mt-1">{j.authority}</p>
                    <p className="text-brand-600 font-semibold mt-2">{j.value}</p>
                    <span className="inline-block mt-2 text-xs bg-brand-100 text-brand-700 font-semibold px-2 py-0.5 rounded-full">✓ Won</span>
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
};

const WizardProgress = ({ step, total }) => (
  <div className="flex items-center justify-between mb-8">
    <div className="flex gap-1.5">
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${i<step?'bg-brand-600 w-6':i===step?'bg-brand-400 w-6':'bg-slate-200 w-3'}`}/>
      ))}
    </div>
    <span className="text-xs text-slate-400 font-medium">Step {step+1} of {total}</span>

const SetupWizard = ({ onComplete }) => {
  const [step, setStep] = useState(0);
  const [scoreCount, setScoreCount] = useState(0);
  const [revealDone, setRevealDone] = useState(false);
  const TOTAL = 7;

  const [co, setCo] = useState({name:'',reg:'',location:'',employees:'',turnover:'',publicSector:50});
  const [trade, setTrade] = useState('');
  const [plant, setPlant] = useState([]);
  const [vehicles, setVehicles] = useState([]);
  const [certs, setCerts] = useState({});
  const [newPlant, setNewPlant] = useState({name:'',type:'Excavator 20–30t',hvo:false});
  const [newVeh, setNewVeh]     = useState({name:'',type:'Transit Custom diesel'});

  const STARTING_SCORE = 52;

  useEffect(() => {
    if (step === 6) {
      let c = 0;
      const iv = setInterval(() => {
        c += 1;
        setScoreCount(c);
        if (c >= STARTING_SCORE) { clearInterval(iv); setRevealDone(true); }
      }, 28);
      return () => clearInterval(iv);
    }
  }, [step]);

  const next = () => setStep(s => Math.min(s+1, TOTAL-1));
  const back = () => setStep(s => Math.max(s-1, 0));

  const certState = (id) => certs[id] || 'no';
  const cycleCert = (id) => setCerts(prev => {
    const cur = prev[id]||'no';
    return {...prev, [id]: cur==='no'?'yes':cur==='yes'?'progress':'no'};
  });

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
      <div className="w-full max-w-2xl">

        {/* STEP 0 — WELCOME */}
        {step===0 && (
          <div className="text-center">
            <div className="w-16 h-16 bg-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
              <span className="text-white font-bold text-xl">GW</span>
            </div>
            <h1 className="text-3xl font-bold text-slate-900 mb-3">Welcome to Groundwork</h1>
            <p className="text-slate-500 text-lg mb-2">Stop losing contracts because you can't answer the sustainability question.</p>
            <p className="text-slate-400 text-sm mb-8 max-w-md mx-auto">Set up your fleet and certifications once. After that, keeping your score updated takes 5–8 minutes a month. Your first score is ready in 30 minutes.</p>
            <button onClick={next} className="px-8 py-3.5 bg-brand-600 text-white font-semibold rounded-xl hover:bg-brand-700 transition-all text-lg">
              Get started →
            </button>
            <p className="text-slate-400 text-xs mt-4">Already have an account? <span className="text-brand-600 cursor-pointer hover:underline">Sign in</span></p>
          </div>
        )}

        {/* STEP 1 — BUSINESS DETAILS */}
        {step===1 && (
          <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <WizardProgress step={step} total={TOTAL}/>
            <h2 className="text-2xl font-bold text-slate-900 mb-1">Tell us about your business</h2>
            <p className="text-slate-400 text-sm mb-6">This sets up your profile and determines which contract frameworks you can target.</p>
            <div className="grid grid-cols-2 gap-4">
              <div className="col-span-2">
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Company name *</label>
                <input value={co.name} onChange={e=>setCo(p=>({...p,name:e.target.value}))} placeholder="e.g. Hartley Construction Ltd"
                  className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-400"/>
              </div>
              <div>
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Companies House number</label>
                <input value={co.reg} onChange={e=>setCo(p=>({...p,reg:e.target.value}))} placeholder="e.g. 09834712"
                  className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-400"/>
              </div>
              <div>
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Location / postcode</label>
                <input value={co.location} onChange={e=>setCo(p=>({...p,location:e.target.value}))} placeholder="e.g. Birmingham, B1 1AA"
                  className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-400"/>
              </div>
              <div>
                <label className="text-xs font-semibold text-slate-500 uppercase tracking-wide block mb-1.5">Employees (direct)</label>
                <input type="number" value={co.employees} onChange={e=>setCo(p=>({...p,employees:e.target.value}))} placeholder="e.g. 24"
                  className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-400"/>

              {success && <div className="mb-4 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm">{success}</div>}

                      className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-white"/>
                  </div>
                  <div>
                    <div className="flex justify-between items-center mb-1.5">
                      <label className="block text-sm font-medium text-slate-700">Password</label>
                      <button type="button" className="text-xs text-brand-600 hover:text-brand-800 font-medium">Forgot password?</button>
                    </div>
                    <input type="password" required value={password} onChange={e=>setPassword(e.target.value)}
                      placeholder="••••••••"
                      className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent bg-white"/>
                  </div>
                  <button type="submit" disabled={loading}
                    className="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-semibold text-sm transition-colors flex items-center justify-center gap-2 disabled:opacity-60">
                    {loading ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin inline-block"/>Signing in…</> : 'Sign in to Groundwork'}
                  </button>
                  <p className="text-center text-sm text-slate-500">
                    Don't have an account?{' '}
                    <button type="button" onClick={() => setTab('register')} className="text-brand-600 font-semibold hover:text-brand-800">Create one free</button>
                  </p>
                </form>
              ) : (
                <form onSubmit={handleRegister} className="space-y-4">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1.5">Your name</label>
                      <input type="text" required value={name} onChange={e=>setName(e.target.value)}
                        placeholder="James Mitchell"
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1.5">Company name</label>
                      <input type="text" required value={company} onChange={e=>setCompany(e.target.value)}
                        placeholder="Mitchell Ltd"
                        className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
                    </div>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
                    <input type="email" required value={email} onChange={e=>setEmail(e.target.value)}
                      placeholder="you@company.com"
                      className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input type="password" required value={password} onChange={e=>setPassword(e.target.value)}
                      placeholder="Min. 8 characters"
                      className="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
                  </div>
                  <div className="p-4 bg-slate-50 border border-slate-200 rounded-xl">
                    <div className="flex items-center justify-between">
                      <div>
                        <p className="text-sm font-semibold text-slate-800">30-day free trial</p>
                        <p className="text-xs text-slate-500 mt-0.5">Plan: <span className="font-medium capitalize">{plan}</span> — no card required</p>
                      </div>
                      <button type="button" onClick={() => setTab('pricing')} className="text-xs text-brand-600 font-semibold hover:text-brand-800 underline">Change plan</button>
                    </div>
                  </div>
                  <button type="submit" disabled={loading}
                    className="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white rounded-xl font-semibold text-sm transition-colors flex items-center justify-center gap-2 disabled:opacity-60">
                    {loading ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin inline-block"/>Creating account…</> : 'Start free trial →'}
                  </button>
                  <p className="text-center text-xs text-slate-400">By creating an account you agree to our Terms of Service and Privacy Policy</p>
                </form>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════
// SUPABASE DATA SERVICE
// ═══════════════════════════════════════════════════════
const DB = {
  async getProfile(userId) {
    const { data } = await supabaseClient.from('profiles').select('*, companies(*)').eq('id', userId).single();
    return data;
  },
  async loadAppData(userId) {
    const profile = await DB.getProfile(userId);
    if (!profile?.company_id) return null;
    const cid = profile.company_id;
    const [plantRes, vehicleRes, certRes, updateRes, historyRes] = await Promise.all([
      supabaseClient.from('plant_fleet').select('*').eq('company_id', cid).eq('active', true),
      supabaseClient.from('vehicles').select('*').eq('company_id', cid).eq('active', true),
      supabaseClient.from('certifications').select('*').eq('company_id', cid),
      supabaseClient.from('monthly_updates').select('*').eq('company_id', cid).order('created_at', { ascending: false }).limit(1).single(),
      supabaseClient.from('score_history').select('*').eq('company_id', cid).order('recorded_at', { ascending: false }).limit(6),
    ]);
    const lastUpdate = updateRes.data;
    const plant = (plantRes.data || []).map((p) => {
      const lastHours = lastUpdate ? (lastUpdate.plant_hours || []).find(h => h.name === p.name)?.hours || 0 : 0;
      const efStored = p.ef_kg_per_hr || DEFRA.plant[p.category]?.factor || 12.5;
      return { id: p.id, name: p.name, type: p.category || 'Excavator 20–30t', hours: lastHours, hvo: p.fuel_type === 'hvo', ef: efStored };
    });
    const vehicles = (vehicleRes.data || []).map((v) => {
      const lastMiles = lastUpdate ? (lastUpdate.vehicle_miles || []).find(m => m.name === v.name)?.miles || 0 : 0;
      const typeGuess = v.fuel_type === 'electric' ? 'Transit Custom electric' : 'Transit Custom diesel';
      const efStored = v.ef_kg_per_mile || DEFRA.vehicles[typeGuess]?.factor || 0.274;
      return { id: v.id, name: v.name, type: typeGuess, miles: lastMiles, ef: efStored };
    });
    const certs = {};
    (certRes.data || []).forEach(c => { certs[c.cert_key] = c.status === 'held' ? 'yes' : c.status === 'in_progress' ? 'progress' : 'no'; });
    const scoreHistory = (historyRes.data || []).reverse().map(h => ({ month: new Date(h.recorded_at).toLocaleString('en-GB',{month:'short'}), score: Math.round(h.score) }));
    const latestScore = lastUpdate?.score || 52;
    return {
      company: { ...profile.companies, name: profile.companies?.name || profile.full_name, score: latestScore, plan: profile.companies?.plan || 'essentials', trade: profile.companies?.trade || '' },
      plant, vehicles, certs, scoreHistory,
      fullName: profile.full_name || '',
    };
  },
  async saveWizardData({ userId, co, trade, plant: plantList, vehicles: vehicleList, certs }) {
    // Update company
    const companyId = (await supabaseClient.from('profiles').select('company_id').eq('id', userId).single()).data?.company_id;
    if (!companyId) return;
    await supabaseClient.from('companies').update({ name: co.name || undefined, trade, employees: parseInt(co.employees) || undefined, turnover_band: co.turnover || undefined, updated_at: new Date().toISOString() }).eq('id', companyId);
    // Save plant fleet
    if (plantList.length > 0) {
      const plantRows = plantList.map(p => ({ company_id: companyId, name: p.name || p.type, category: p.type, fuel_type: p.hvo ? 'hvo' : 'diesel', ef_kg_per_hr: DEFRA.plant[p.type] ?? 12.5 }));
      await supabaseClient.from('plant_fleet').delete().eq('company_id', companyId);
      await supabaseClient.from('plant_fleet').insert(plantRows);
    }
    // Save vehicles
    if (vehicleList.length > 0) {
      const vehRows = vehicleList.map(v => ({ company_id: companyId, name: v.name || v.type, fuel_type: v.type?.toLowerCase().includes('electric') ? 'electric' : 'diesel', ef_kg_per_mile: (DEFRA.vehicles[v.type] ?? 0.24) }));
      await supabaseClient.from('vehicles').delete().eq('company_id', companyId);
      await supabaseClient.from('vehicles').insert(vehRows);
    }
    // Save certifications
    const certEntries = Object.entries(certs);
    if (certEntries.length > 0) {
      const certRows = certEntries.map(([cert_key, status]) => ({ company_id: companyId, cert_key, status: status === 'yes' ? 'held' : status === 'progress' ? 'in_progress' : 'none', updated_at: new Date().toISOString() }));
      for (const row of certRows) {
        await supabaseClient.from('certifications').upsert(row, { onConflict: 'company_id,cert_key' });
      }
    }
  },
  async saveMonthlyUpdate({ userId, plant: plantData, vehicles: vehicleData, score, co2e }) {
    const companyId = (await supabaseClient.from('profiles').select('company_id').eq('id', userId).single()).data?.company_id;
    if (!companyId) return;
    const now = new Date();
    const month = now.getMonth() + 1;
    const year = now.getFullYear();
    await supabaseClient.from('monthly_updates').upsert({
      company_id: companyId, period_month: month, period_year: year,
      plant_hours: plantData, vehicle_miles: vehicleData,
      score, co2e_total_t: co2e, submitted_by: userId, created_at: now.toISOString(),
    }, { onConflict: 'company_id,period_year,period_month' });
    await supabaseClient.from('score_history').insert({ company_id: companyId, score, co2e_total_t: co2e, period_month: month, period_year: year });
  },
};

// ═══════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════
const App = () => {
  const [authState, setAuthState] = useState('loading');
  const [user, setUser]           = useState(null);
  const [onboarded, setOnboarded] = useState(false);
  const [appData, setAppData]     = useState(null);
  const [page, setPage]           = useState('dashboard');
  const labels = { dashboard:'Dashboard', update:'Update Data', insights:'Score & Insights', ghg:'GHG Explorer', reports:'Reports', strategy:'Strategy Hub', tender:'Tender Tracker', benchmarks:'Benchmarks', settings:'Settings' };

  const initUser = async (u) => {
    if (!u) return;
    try {
      const data = await DB.loadAppData(u.id);
      if (data) { setAppData(data); setOnboarded(true); }
      else { setOnboarded(false); }
    } catch(_) { setOnboarded(false); }
  };

  React.useEffect(() => {
    if (DEMO_MODE) { setAuthState('unauthenticated'); return; }
    supabaseClient.auth.getSession().then(async ({ data: { session } }) => {
      if (session?.user) {
        setUser(session.user);
        await initUser(session.user);
        setAuthState('authenticated');
      } else { setAuthState('unauthenticated'); }
    });
    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(async (_event, session) => {
      if (session?.user) {
        setUser(session.user);
        await initUser(session.user);
        setAuthState('authenticated');
      } else { setUser(null); setAppData(null); setAuthState('unauthenticated'); setOnboarded(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleSignOut = async () => {
    if (!DEMO_MODE) await supabaseClient.auth.signOut();
    setUser(null); setAppData(null); setAuthState('unauthenticated'); setOnboarded(false);
  };

  const handleWizardComplete = async ({ co, trade, plant, vehicles, certs }) => {
    if (!DEMO_MODE && user) {
      try {
        await DB.saveWizardData({ userId: user.id, co, trade, plant, vehicles, certs });
        const data = await DB.loadAppData(user.id);
        if (data) setAppData(data);
      } catch(_) {}
    }
    setOnboarded(true);
  };

  // Build context value — live user data with graceful fallbacks
  const ctx = appData ? {
    company:      appData.company,
    plantFleet:   appData.plant,
    vehicleFleet: appData.vehicles,
    certs:        appData.certs,
    scoreHistory: appData.scoreHistory,
    fullName:     appData.fullName,
    score:        appData.company?.score ?? 52,
    refreshData:  () => user && DB.loadAppData(user.id).then(d => d && setAppData(d)),
  } : {
    company:      { name:'Your Company', score:52, plan:'essentials', trade:'' },
    plantFleet:   [],
    vehicleFleet: [],
    certs:        {},
    scoreHistory: [],
    fullName:     user?.user_metadata?.full_name || '',
    score:        52,
    refreshData:  () => {},
  };

  const Spinner = () => (
    <div className="min-h-screen flex items-center justify-center bg-slate-50">
      <div className="flex flex-col items-center gap-4">
        <div className="w-12 h-12 bg-brand-600 rounded-xl flex items-center justify-center">
          <svg className="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <div className="w-6 h-6 border-2 border-brand-600 border-t-transparent rounded-full animate-spin"/>
      </div>
    </div>
  );

  if (authState === 'loading') return <Spinner/>;
  if (authState === 'unauthenticated') return <AuthPage onAuth={(u) => { setUser(u); setAuthState('authenticated'); }}/>;
  if (authState === 'authenticated' && !onboarded) return <SetupWizard onComplete={handleWizardComplete}/>;

  const renderPage = () => {
    switch(page) {
      case 'dashboard':  return <DashboardPage onNavigate={setPage}/>;
      case 'update':     return <UpdatePage onNavigate={setPage}/>;
      case 'insights':   return <InsightsPage/>;
      case 'ghg':        return <GHGPage/>;
      case 'reports':    return <ReportsPage/>;
      case 'strategy':   return <StrategyPage/>;
      case 'tender':     return <TenderPage/>;
      default:           return <><Header title={labels[page]}/><ComingSoon name={labels[page]}/></>;
    }
  };

  return (
    <AppCtx.Provider value={ctx}>
      <div className="flex min-h-screen bg-slate-50">
        <Sidebar current={page} onChange={setPage} onWizard={() => setOnboarded(false)} onSignOut={handleSignOut}/>
        <main className="flex-1 ml-64 flex flex-col min-h-screen">{renderPage()}</main>
      </div>
    </AppCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
